services:
    db:
        image: postgres:16
        container_name: fincore-postgres
        environment:
            POSTGRES_USER: fincore
            POSTGRES_PASSWORD: fincore_pw
            POSTGRES_DB: fincore
        ports:
            - "5432:5432"
        volumes:
          - fincore_pgdata:/var/lib/postgresql/data
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U fincore -d fincore"]
          interval: 3s
          timeout: 3s
          retries: 10

volumes:
    fincore_pgdata: